<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - QRcovery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #d4af37;
            --gold-dark: #b38f00;
            --bg-page: #f8f9fb;
            --bg-card: #ffffff;
            --text-primary: #1a1f36;
            --text-secondary: #5a6e8a;
            --text-tertiary: #8a99b0;
            --border: #e9edf2;
            --shadow-lg: 0 12px 24px rgba(0,0,0,0.04), 0 4px 8px rgba(0,0,0,0.02);
            --radius: 16px;
            --radius-sm: 10px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .navbar {
            background: var(--bg-card);
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--gold);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 18px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .logo-text span {
            color: var(--gold);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--gold);
        }

        .nav-links .auth-link {
            background: var(--gold);
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
        }

        .form-container {
            max-width: 420px;
            margin: 80px auto;
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 40px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
        }

        .form-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .form-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .form-header p {
            color: var(--text-tertiary);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--gold);
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-login:hover {
            background: var(--gold-dark);
            transform: translateY(-1px);
        }

        .form-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-tertiary);
        }

        .form-footer a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 500;
        }

        .message {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            margin-bottom: 24px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: #10b98120;
            color: #10b981;
            border: 1px solid #10b98130;
            display: block;
        }

        .message.error {
            background: #ef444420;
            color: #dc2626;
            border: 1px solid #ef444430;
            display: block;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            border-top: 1px solid var(--border);
            padding: 24px 0;
            text-align: center;
            margin-top: 60px;
        }

        .footer p {
            color: var(--text-tertiary);
            font-size: 13px;
        }

        @media (max-width: 700px) {
            .navbar .container {
                flex-direction: column;
                gap: 12px;
            }
            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
                gap: 16px;
            }
            .form-container {
                margin: 40px 20px;
                padding: 28px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <div class="logo-icon">QR</div>
                <div class="logo-text"><span>QR</span>covery</div>
            </div>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/discover.html">Discover</a>
                <a href="/report.html">Scan QR</a>
                <a href="/report-manual.html">Report Item</a>
                <a href="/test-codes.html">Test Codes</a>
                <a href="/register.html" class="auth-link">Register</a>
                <a href="/login.html" class="auth-link">Login</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="form-container">
            <div class="form-header">
                <h1>Welcome Back</h1>
                <p>Login to your QRcovery account</p>
            </div>

            <div id="message" class="message"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label>School Email</label>
                    <input type="email" id="email" name="email" placeholder="you@hmacademy.org" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">Login</button>
            </form>

            <div class="form-footer">
                Don't have an account? <a href="/register.html">Register here</a>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>© 2026 QRcovery — Developed by the ICT CTL Team of Haile-Manas Academy</p>
            <p style="margin-top: 8px; font-size: 12px;">Scan. Connect. Recover.</p>
        </div>
    </footer>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('loginBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Logging in <span class="loading"></span>';
            btn.disabled = true;

            const messageDiv = document.getElementById('message');
            messageDiv.className = 'message';
            messageDiv.style.display = 'none';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (result.success) {
                    messageDiv.className = 'message success';
                    messageDiv.innerHTML = '✅ Login successful! Redirecting...';
                    messageDiv.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = '/profile.html';
                    }, 1500);
                } else {
                    throw new Error(result.error || 'Login failed');
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.innerHTML = `❌ ${error.message}`;
                messageDiv.style.display = 'block';
                
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
    <canvas id="particles"></canvas>
</body>
</html>
