<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - QRcovery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #d4af37;
            --gold-dark: #b38f00;
            --gold-light: #f5e6b0;
            --bg-page: #f8f9fb;
            --bg-card: #ffffff;
            --text-primary: #1a1f36;
            --text-secondary: #5a6e8a;
            --text-tertiary: #8a99b0;
            --border: #e9edf2;
            --shadow-md: 0 4px 12px rgba(0,0,0,0.03), 0 2px 4px rgba(0,0,0,0.02);
            --shadow-lg: 0 12px 24px rgba(0,0,0,0.04), 0 4px 8px rgba(0,0,0,0.02);
            --radius: 16px;
            --radius-sm: 10px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .navbar {
            background: var(--bg-card);
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--gold);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 18px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .logo-text span {
            color: var(--gold);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--gold);
        }

        .nav-links .auth-link {
            background: var(--gold);
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
        }

        .nav-links .auth-link:hover {
            background: var(--gold-dark);
            color: white;
        }

        /* Form Container */
        .form-container {
            max-width: 480px;
            margin: 60px auto;
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 40px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
        }

        .form-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .form-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .form-header p {
            color: var(--text-tertiary);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
            background: var(--bg-card);
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: var(--gold);
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-register:hover {
            background: var(--gold-dark);
            transform: translateY(-1px);
        }

        .form-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-tertiary);
        }

        .form-footer a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 500;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        .message {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            margin-bottom: 24px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: #10b98120;
            color: #10b981;
            border: 1px solid #10b98130;
            display: block;
        }

        .message.error {
            background: #ef444420;
            color: #dc2626;
            border: 1px solid #ef444430;
            display: block;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            border-top: 1px solid var(--border);
            padding: 24px 0;
            text-align: center;
            margin-top: 48px;
        }

        .footer p {
            color: var(--text-tertiary);
            font-size: 13px;
        }

        @media (max-width: 700px) {
            .navbar .container {
                flex-direction: column;
                gap: 12px;
            }
            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
                gap: 16px;
            }
            .form-container {
                margin: 40px 20px;
                padding: 28px;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <div class="logo-icon">QR</div>
                <div class="logo-text"><span>QR</span>covery</div>
            </div>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/discover.html">Discover</a>
                <a href="/report.html">Scan QR</a>
                <a href="/report-manual.html">Report Item</a>
                <a href="/test-codes.html">Test Codes</a>
                <a href="/register.html" class="auth-link">Register</a>
                <a href="/login.html" class="auth-link">Login</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="form-container">
            <div class="form-header">
                <h1>Create Account</h1>
                <p>Join QRcovery and never lose your items again</p>
            </div>

            <div id="message" class="message"></div>

            <form id="registerForm" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label>School Email</label>
                    <input type="email" name="email" placeholder="you@hmacademy.org" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Create a password" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Gender</label>
                        <select name="gender" required>
                            <option value="">Select</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Grade</label>
                        <select name="grade" required>
                            <option value="">Select</option>
                            <option value="9">Grade 9</option>
                            <option value="10">Grade 10</option>
                            <option value="11">Grade 11</option>
                            <option value="12">Grade 12</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Profile Photo (optional)</label>
                    <input type="file" name="photo" accept="image/*">
                </div>

                <button type="submit" class="btn-register" id="registerBtn">Register</button>
            </form>

            <div class="form-footer">
                Already have an account? <a href="/login.html">Login here</a>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>© 2026 QRcovery — Developed by the ICT CTL Team of Haile-Manas Academy</p>
            <p style="margin-top: 8px; font-size: 12px;">Scan. Connect. Recover.</p>
        </div>
    </footer>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('registerBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Registering <span class="loading"></span>';
            btn.disabled = true;

            const messageDiv = document.getElementById('message');
            messageDiv.className = 'message';
            messageDiv.style.display = 'none';

            const formData = new FormData(e.target);

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    messageDiv.className = 'message success';
                    messageDiv.innerHTML = `✅ Registration successful! Welcome, ${formData.get('name')}! Redirecting...`;
                    messageDiv.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = '/profile.html';
                    }, 2000);
                } else {
                    throw new Error(result.error || 'Registration failed');
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.innerHTML = `❌ ${error.message}`;
                messageDiv.style.display = 'block';
                
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
