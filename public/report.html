<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan QR - QRcovery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #d4af37;
            --gold-dark: #b38f00;
            --gold-light: #f5e6b0;
            --bg-page: #f8f9fb;
            --bg-card: #ffffff;
            --text-primary: #1a1f36;
            --text-secondary: #5a6e8a;
            --text-tertiary: #8a99b0;
            --border: #e9edf2;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.02);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.03);
            --shadow-lg: 0 12px 24px rgba(0,0,0,0.04);
            --radius: 16px;
            --radius-sm: 10px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Navigation */
        .navbar {
            background: var(--bg-card);
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--gold);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 18px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .logo-text span {
            color: var(--gold);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--gold);
        }

        .nav-links a.active {
            color: var(--gold);
        }

        .auth-link {
            background: var(--gold);
            color: white !important;
            padding: 8px 20px;
            border-radius: 40px;
        }

        .auth-link:hover {
            background: var(--gold-dark);
            color: white !important;
        }

        /* Form Container */
        .form-container {
            max-width: 550px;
            margin: 48px auto;
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 36px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md);
        }

        .form-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .form-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .form-header p {
            color: var(--text-tertiary);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
            background: var(--bg-card);
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }

        .form-group input[readonly] {
            background: var(--bg-page);
            color: var(--text-tertiary);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--gold);
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-submit:hover {
            background: var(--gold-dark);
            transform: translateY(-1px);
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .message {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: #10b98120;
            color: #10b981;
            border: 1px solid #10b98130;
            display: block;
        }

        .message.error {
            background: #ef444420;
            color: #dc2626;
            border: 1px solid #ef444430;
            display: block;
        }

        .message.info {
            background: var(--gold-light);
            color: var(--gold-dark);
            border: 1px solid var(--gold);
            display: block;
        }

        #loading-state {
            text-align: center;
            padding: 40px;
            color: var(--text-tertiary);
        }

        .footer {
            border-top: 1px solid var(--border);
            padding: 24px 0;
            text-align: center;
            margin-top: 48px;
        }

        .footer p {
            color: var(--text-tertiary);
            font-size: 13px;
        }

        @media (max-width: 700px) {
            .navbar .container {
                flex-direction: column;
                gap: 12px;
            }
            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
                gap: 16px;
            }
            .form-container {
                margin: 24px;
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <div class="logo-icon">QR</div>
                <div class="logo-text"><span>QR</span>covery</div>
            </div>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/discover.html">Discover</a>
                <a href="/report.html" class="active">Scan QR</a>
                <a href="/report-manual.html">Report Item</a>
                <a href="/test-codes.html">Test Codes</a>
                <a href="/register.html" class="auth-link">Register</a>
                <a href="/login.html" class="auth-link">Login</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="form-container">
            <div class="form-header">
                <h1>Report Found Item</h1>
                <p>Scan a QR code to help return items to their owners</p>
            </div>

            <div id="loading-state">
                <div style="width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px;"></div>
                <p>Loading item information...</p>
            </div>

            <div id="error-message" class="message error" style="display: none;"></div>

            <form id="reportForm" style="display: none;">
                <input type="hidden" id="item_code" name="item_code">

                <div class="form-group">
                    <label>Item</label>
                    <input type="text" id="item_name" readonly>
                </div>

                <div class="form-group">
                    <label>Owner</label>
                    <input type="text" id="owner_name" readonly>
                </div>

                <div class="form-group">
                    <label>Owner Email</label>
                    <input type="email" id="owner_email" readonly>
                </div>

                <div class="form-group">
                    <label>Where did you find it?</label>
                    <select id="location" name="location" required>
                        <option value="">Select location</option>
                        <option value="Library">📚 Library</option>
                        <option value="Gym">💪 Gym</option>
                        <option value="Cafeteria">🍽️ Cafeteria</option>
                        <option value="Computer Lab">💻 Computer Lab</option>
                        <option value="Grade 9 girls dorm">🏠 Grade 9 Girls Dorm</option>
                        <option value="Grade 9 boys dorm">🏠 Grade 9 Boys Dorm</option>
                        <option value="Grade 10 girls dorm">🏠 Grade 10 Girls Dorm</option>
                        <option value="Grade 10 boys dorm">🏠 Grade 10 Boys Dorm</option>
                        <option value="Math classrooms">📐 Math Classrooms</option>
                        <option value="English classrooms">📖 English Classrooms</option>
                        <option value="Design classrooms">🎨 Design Classrooms</option>
                        <option value="History classrooms">🏛️ History Classrooms</option>
                        <option value="CC class">📝 CC Class</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Your Name (optional)</label>
                    <input type="text" id="finder_name" placeholder="Helps owner know who found it">
                </div>

                <div class="form-group">
                    <label>Your Email (optional)</label>
                    <input type="email" id="finder_email" placeholder="So owner can contact you">
                </div>

                <div class="form-group">
                    <label>Photo (optional)</label>
                    <input type="file" id="photo" accept="image/*" capture="environment">
                </div>

                <div class="form-group">
                    <label>Additional Notes</label>
                    <textarea id="notes" rows="3" placeholder="e.g., Left on the third table, near the window, etc."></textarea>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">Send Notification to Owner</button>
            </form>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>© 2026 QRcovery — Developed by the ICT CTL Team of Haile-Manas Academy</p>
            <p style="margin-top: 8px; font-size: 12px;">Scan. Connect. Recover.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
        emailjs.init('bRVHUE9wFV4psMnIu');

        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');

        const loadingDiv = document.getElementById('loading-state');
        const errorDiv = document.getElementById('error-message');
        const form = document.getElementById('reportForm');

        if (!code) {
            loadingDiv.style.display = 'none';
            errorDiv.style.display = 'block';
            errorDiv.innerHTML = '❌ No QR code detected. Please scan a valid QRcovery code.';
        } else {
            fetch(`/api/item/${code}`)
                .then(response => {
                    if (!response.ok) throw new Error('Item not found');
                    return response.json();
                })
                .then(item => {
                    document.getElementById('item_code').value = code;
                    document.getElementById('item_name').value = `${item.item_name}${item.description ? ' - ' + item.description : ''}`;
                    document.getElementById('owner_name').value = item.owner_name || '';
                    document.getElementById('owner_email').value = item.owner_email || '';

                    loadingDiv.style.display = 'none';
                    form.style.display = 'block';
                })
                .catch(err => {
                    loadingDiv.style.display = 'none';
                    errorDiv.style.display = 'block';
                    errorDiv.innerHTML = `❌ Item not found. Code: ${code} is not registered in QRcovery.`;
                });
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = 'Sending <span class="loading"></span>';
            btn.disabled = true;

            const ownerEmail = document.getElementById('owner_email').value;
            const location = document.getElementById('location').value;
            const notes = document.getElementById('notes').value;
            const finderName = document.getElementById('finder_name').value || 'Anonymous';
            const finderEmail = document.getElementById('finder_email').value || 'Not provided';
            const photoFile = document.getElementById('photo').files[0];

            let base64Photo = '';
            if (photoFile) {
                const reader = new FileReader();
                const data = await new Promise((resolve) => {
                    reader.onload = (e) => resolve(e.target.result.split(',')[1]);
                    reader.readAsDataURL(photoFile);
                });
                base64Photo = data;
            }

            const templateParams = {
                to_email: ownerEmail,
                from_name: 'QRcovery',
                location: location,
                notes: notes,
                finder_name: finderName,
                finder_email: finderEmail,
                photo: base64Photo,
                filename: photoFile ? photoFile.name : ''
            };

            try {
                await emailjs.send('service_ym11glb', 'template_mgg9tjx', templateParams);
                
                const formData = new FormData();
                formData.append('item_code', code);
                formData.append('location', location);
                formData.append('finder_name', finderName);
                formData.append('finder_email', finderEmail);
                formData.append('notes', notes);
                if (photoFile) formData.append('photo', photoFile);

                await fetch('/api/report', { method: 'POST', body: formData });
                
                const successDiv = document.createElement('div');
                successDiv.className = 'message success';
                successDiv.innerHTML = '✅ Notification sent! Redirecting to Discover...';
                form.parentNode.insertBefore(successDiv, form);
                form.style.display = 'none';
                
                setTimeout(() => { window.location.href = '/discover.html'; }, 2000);
            } catch (err) {
                btn.innerHTML = 'Send Notification to Owner';
                btn.disabled = false;
                const errorMsg = document.createElement('div');
                errorMsg.className = 'message error';
                errorMsg.innerHTML = '❌ Failed to send email. Please try again.';
                form.parentNode.insertBefore(errorMsg, form);
                setTimeout(() => errorMsg.remove(), 3000);
            }
        });
    </script>
</body>
</html>
