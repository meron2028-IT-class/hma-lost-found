<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - QRcovery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #d4af37;
            --gold-dark: #b38f00;
            --gold-light: #f5e6b0;
            --bg-page: #f8f9fb;
            --bg-card: #ffffff;
            --text-primary: #1a1f36;
            --text-secondary: #5a6e8a;
            --text-tertiary: #8a99b0;
            --border: #e9edf2;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.02);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.03);
            --shadow-lg: 0 12px 24px rgba(0,0,0,0.04);
            --radius: 16px;
            --radius-sm: 10px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .navbar {
            background: var(--bg-card);
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--gold);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 18px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .logo-text span {
            color: var(--gold);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--gold);
        }

        .nav-links .auth-link {
            background: var(--gold);
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
        }

        .profile-header {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            padding: 40px;
            border-radius: var(--radius);
            margin: 32px 0;
            display: flex;
            align-items: center;
            gap: 32px;
            flex-wrap: wrap;
            box-shadow: var(--shadow-lg);
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: var(--gold);
            border: 4px solid white;
            overflow: hidden;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-info h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .profile-info p {
            color: rgba(255,255,255,0.9);
            margin-bottom: 4px;
        }

        .profile-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 8px;
        }

        .btn-logout {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            margin-left: 20px;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            background: rgba(255,255,255,0.3);
        }

        .section-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 28px;
            margin-bottom: 32px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .section-header h2 {
            font-size: 20px;
            font-weight: 600;
        }

        .btn-add {
            background: var(--gold);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-add:hover {
            background: var(--gold-dark);
            transform: translateY(-1px);
        }

        .add-form {
            background: var(--bg-page);
            border-radius: var(--radius-sm);
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
            display: none;
        }

        .add-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--gold);
        }

        .btn-save {
            background: var(--gold);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .item-card {
            background: var(--bg-page);
            border-radius: var(--radius-sm);
            padding: 20px;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .item-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--gold);
        }

        .item-card h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .item-code {
            font-family: monospace;
            font-size: 12px;
            background: var(--bg-page);
            padding: 6px 10px;
            border-radius: 6px;
            margin: 12px 0;
            color: var(--text-secondary);
        }

        .qr-preview {
            margin: 16px 0;
            text-align: center;
        }

        .qr-preview img {
            width: 140px;
            height: 140px;
            border-radius: 12px;
            padding: 8px;
            background: white;
            border: 1px solid var(--border);
        }

        .download-btn {
            width: 100%;
            padding: 10px;
            background: var(--gold);
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .download-btn:hover {
            background: var(--gold-dark);
        }

        .empty-state {
            text-align: center;
            padding: 48px;
            color: var(--text-tertiary);
        }

        .loading {
            text-align: center;
            padding: 60px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            border-top: 1px solid var(--border);
            padding: 24px 0;
            text-align: center;
            margin-top: 48px;
        }

        .footer p {
            color: var(--text-tertiary);
            font-size: 13px;
        }

        @media (max-width: 700px) {
            .navbar .container {
                flex-direction: column;
                gap: 12px;
            }
            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
                gap: 16px;
            }
            .profile-header {
                flex-direction: column;
                text-align: center;
            }
            .btn-logout {
                margin-left: 0;
                margin-top: 12px;
            }
            .section-header {
                flex-direction: column;
                align-items: stretch;
            }
            .btn-add {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <div class="logo-icon">QR</div>
                <div class="logo-text"><span>QR</span>covery</div>
            </div>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/discover.html">Discover</a>
                <a href="/report.html">Scan QR</a>
                <a href="/report-manual.html">Report Item</a>
                <a href="/test-codes.html">Test Codes</a>
                <a href="/register.html" class="auth-link">Register</a>
                <a href="/login.html" class="auth-link">Login</a>
                <a href="/profile.html" class="auth-link">Profile</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div id="loading" class="loading">
            <div class="loading-spinner"></div>
            <p>Loading your profile...</p>
        </div>

        <div id="profileContent" style="display: none;">
            <div class="profile-header">
                <div class="profile-avatar" id="profileAvatar">👤</div>
                <div class="profile-info">
                    <h1 id="profileName"></h1>
                    <p id="profileEmail"></p>
                    <p id="profileGrade"></p>
                    <span class="profile-badge" id="profileGender"></span>
                    <button class="btn-logout" id="logoutBtn">Logout</button>
                </div>
            </div>

            <div class="section-card">
                <div class="section-header">
                    <h2>My Items</h2>
                    <button class="btn-add" id="showAddForm">+ Add New Item</button>
                </div>

                <div class="add-form" id="addItemForm">
                    <h3 style="margin-bottom: 16px;">Add New Item</h3>
                    <form id="itemForm">
                        <div class="form-group">
                            <input type="text" name="item_name" placeholder="Item Name (e.g., iPad, AirPods)" required>
                        </div>
                        <div class="form-group">
                            <textarea name="description" placeholder="Description (color, model, etc.)" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn-save">Generate QR Code</button>
                    </form>
                </div>

                <div class="items-grid" id="itemsList"></div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>© 2026 QRcovery — Developed by the ICT CTL Team of Haile-Manas Academy</p>
            <p style="margin-top: 8px; font-size: 12px;">Scan. Connect. Recover.</p>
        </div>
    </footer>

    <script>
        let currentUser = null;

        async function checkAuth() {
            try {
                const response = await fetch('/api/me');
                if (!response.ok) {
                    window.location.href = '/login.html';
                    return;
                }
                currentUser = await response.json();
                displayUserInfo();
                loadUserItems();
            } catch (error) {
                window.location.href = '/login.html';
            }
        }

        function displayUserInfo() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('profileContent').style.display = 'block';
            
            document.getElementById('profileName').textContent = currentUser.name;
            document.getElementById('profileEmail').textContent = currentUser.email;
            document.getElementById('profileGrade').textContent = currentUser.grade ? `Grade ${currentUser.grade}` : '';
            document.getElementById('profileGender').textContent = currentUser.gender || 'Not specified';
            
            if (currentUser.photo_url) {
                document.getElementById('profileAvatar').innerHTML = `<img src="${currentUser.photo_url}" alt="Profile">`;
            }
        }

        async function loadUserItems() {
            try {
                const response = await fetch('/api/user-items');
                const items = await response.json();
                displayItems(items);
            } catch (error) {
                console.error('Error loading items:', error);
            }
        }

        function displayItems(items) {
            const container = document.getElementById('itemsList');
            
            if (!items || items.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>No items yet. Click "Add New Item" to create your first QR code!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = items.map(item => `
                <div class="item-card" id="item-${item.item_code}">
                    <h3>${item.item_name}</h3>
                    <p style="color: var(--text-tertiary); font-size: 13px;">${item.description || ''}</p>
                    <div class="item-code">Code: ${item.item_code}</div>
                    <div class="qr-preview" id="qr-${item.item_code}"></div>
                    <button class="download-btn" onclick="downloadQR('${item.item_code}', '${item.item_name}')">Download QR Code</button>
                </div>
            `).join('');

            items.forEach(item => {
                QRCode.toDataURL(`${window.location.origin}/report.html?code=${item.item_code}`, {
                    width: 140,
                    margin: 1
                }, (err, url) => {
                    if (!err) {
                        const qrDiv = document.getElementById(`qr-${item.item_code}`);
                        if (qrDiv) {
                            qrDiv.innerHTML = `<img src="${url}" alt="QR Code">`;
                        }
                    }
                });
            });
        }

        window.downloadQR = function(code, name) {
            const qrImg = document.querySelector(`#qr-${code} img`);
            if (qrImg) {
                const link = document.createElement('a');
                link.href = qrImg.src;
                link.download = `qr-${name}-${code}.png`;
                link.click();
            }
        };

        document.getElementById('showAddForm').addEventListener('click', () => {
            document.getElementById('addItemForm').classList.toggle('active');
        });

        document.getElementById('itemForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const data = {
                item_name: formData.get('item_name'),
                description: formData.get('description') || ''
            };

            try {
                const response = await fetch('/api/user-items', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('addItemForm').classList.remove('active');
                    document.getElementById('itemForm').reset();
                    loadUserItems();
                } else {
                    alert('Error: ' + (result.error || 'Failed to add item'));
                }
            } catch (error) {
                alert('Error adding item: ' + error.message);
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/';
        });

        checkAuth();
    </script>
</body>
</html>
