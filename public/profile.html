<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - HMA Lost and Found</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        .profile-container {
            max-width: 1000px;
            margin: 40px auto;
        }
        
        .profile-header {
            background: linear-gradient(135deg, var(--hma-blue), var(--hma-blue-light));
            color: white;
            padding: 40px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 30px;
            box-shadow: 0 10px 30px rgba(10,38,71,0.2);
        }
        
        .profile-avatar-large {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: var(--hma-blue);
            border: 4px solid var(--hma-orange);
        }
        
        .profile-info-large h1 {
            color: white;
            margin-bottom: 5px;
        }
        
        .profile-info-large p {
            color: rgba(255,255,255,0.9);
            margin-bottom: 5px;
        }
        
        .profile-badge {
            display: inline-block;
            background: var(--hma-orange);
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 14px;
            margin-top: 10px;
        }
        
        .section-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }
        
        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .section-title h3 {
            color: var(--hma-blue);
            font-size: 24px;
        }
        
        .btn-add {
            background: var(--hma-orange);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-add:hover {
            background: var(--hma-orange-dark);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(249,115,22,0.3);
        }
        
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .item-card {
            background: var(--gray-50);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid var(--gray-200);
            transition: all 0.3s;
        }
        
        .item-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-color: var(--hma-orange);
        }
        
        .item-card h4 {
            color: var(--hma-blue);
            margin-bottom: 10px;
        }
        
        .item-code {
            font-family: monospace;
            background: var(--gray-200);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
            margin: 10px 0;
        }
        
        .qr-preview {
            margin: 15px 0;
            text-align: center;
        }
        
        .qr-preview img {
            width: 150px;
            height: 150px;
            border-radius: 10px;
            padding: 10px;
            background: white;
            border: 1px solid var(--gray-200);
        }
        
        .download-btn {
            display: block;
            width: 100%;
            padding: 10px;
            background: var(--hma-blue);
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .download-btn:hover {
            background: var(--hma-blue-light);
        }
        
        .add-form {
            background: var(--gray-50);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            border: 2px dashed var(--gray-300);
            display: none;
        }
        
        .add-form.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--gray-200);
            border-radius: 10px;
            font-size: 16px;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--hma-orange);
            outline: none;
        }
        
        .btn-save {
            background: var(--hma-blue);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-save:hover {
            background: var(--hma-blue-light);
        }
        
        .btn-logout {
            background: transparent;
            color: white;
            border: 2px solid white;
            padding: 8px 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            margin-left: 20px;
        }
        
        .btn-logout:hover {
            background: white;
            color: var(--hma-blue);
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: var(--text-secondary);
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid var(--gray-200);
            border-top-color: var(--hma-orange);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-tertiary);
            grid-column: 1 / -1;
        }
        
        .empty-state i {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="nav-container">
            <div class="flex-center">
                <div class="logo-placeholder">HMA</div>
                <span>Lost and Found</span>
            </div>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/discover.html">Discover</a>
                <a href="/report.html">Scan QR</a>
                <a href="/report-manual.html">Report Item</a>
                <a href="/test-codes.html">Test Codes</a>
                <a href="/register.html" class="auth-link" id="navRegister">Register</a>
                <a href="/login.html" class="auth-link" id="navLogin">Login</a>
                <a href="/profile.html" class="auth-link profile-link active" id="navProfile">Profile</a>
            </div>
            <div class="user-info" id="userInfo">
                <span id="userName">Loading...</span>
                <div class="avatar-placeholder" id="userAvatar">👤</div>
            </div>
        </div>
    </nav>

    <div class="container profile-container">
        <div id="loading" class="loading">
            <div class="loading-spinner"></div>
            <p>Loading your profile...</p>
        </div>

        <div id="profileContent" style="display: none;">
            <div class="profile-header">
                <div class="profile-avatar-large" id="profileAvatar">👤</div>
                <div class="profile-info-large">
                    <h1 id="profileName"></h1>
                    <p id="profileEmail"></p>
                    <p id="profileGrade"></p>
                    <span class="profile-badge" id="profileGender"></span>
                    <button class="btn-logout" id="logoutBtn">Logout</button>
                </div>
            </div>

            <div class="section-card">
                <div class="section-title">
                    <h3>My Items</h3>
                    <button class="btn-add" id="showAddForm">+ Add New Item</button>
                </div>

                <div class="add-form" id="addItemForm">
                    <h4 style="margin-bottom: 15px;">Add New Item</h4>
                    <form id="itemForm">
                        <div class="form-group">
                            <input type="text" name="item_name" placeholder="Item Name (e.g., iPad, AirPods, Calculator)" required>
                        </div>
                        <div class="form-group">
                            <textarea name="description" placeholder="Description (color, model, etc.)" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn-save">Generate QR Code</button>
                    </form>
                </div>

                <div class="items-grid" id="itemsList">
                    <!-- Items will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;

        // Check if user is logged in
        async function checkAuth() {
            try {
                const response = await fetch('/api/me');
                if (!response.ok) {
                    window.location.href = '/login.html';
                    return;
                }
                currentUser = await response.json();
                displayUserInfo();
                loadUserItems();
            } catch (error) {
                console.error('Auth error:', error);
                window.location.href = '/login.html';
            }
        }

        function displayUserInfo() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('profileContent').style.display = 'block';
            
            document.getElementById('profileName').textContent = currentUser.name;
            document.getElementById('profileEmail').textContent = currentUser.email;
            document.getElementById('profileGrade').textContent = `Grade ${currentUser.grade || 'N/A'}`;
            document.getElementById('profileGender').textContent = currentUser.gender || 'Not specified';
            
            document.getElementById('userName').textContent = currentUser.name.split(' ')[0];
            
            if (currentUser.photo_url) {
                document.getElementById('profileAvatar').innerHTML = `<img src="${currentUser.photo_url}" style="width:120px;height:120px;border-radius:50%;">`;
                document.getElementById('userAvatar').innerHTML = `<img src="${currentUser.photo_url}" style="width:40px;height:40px;border-radius:50%;">`;
            }
            
            // Update navigation
            document.getElementById('navRegister').style.display = 'none';
            document.getElementById('navLogin').style.display = 'none';
            document.getElementById('navProfile').style.display = 'inline-block';
        }

        async function loadUserItems() {
            try {
                const response = await fetch('/api/user-items');
                const items = await response.json();
                displayItems(items);
            } catch (error) {
                console.error('Error loading items:', error);
            }
        }

        function displayItems(items) {
            const container = document.getElementById('itemsList');
            
            if (!items || items.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div>📦</div>
                        <h3>No items yet</h3>
                        <p>Click "Add New Item" to create your first QR code!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = items.map(item => `
                <div class="item-card">
                    <h4>${item.item_name}</h4>
                    <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 10px;">${item.description || ''}</p>
                    <div class="item-code">Code: ${item.item_code}</div>
                    <div class="qr-preview" id="qr-${item.item_code}"></div>
                    <a href="#" class="download-btn" onclick="downloadQR('${item.item_code}', '${item.item_name}')">Download QR Code</a>
                </div>
            `).join('');

            // Generate QR codes for each item
            items.forEach(item => {
                const baseUrl = window.location.origin;
                QRCode.toDataURL(`${baseUrl}/report.html?code=${item.item_code}`, (err, url) => {
                    if (!err) {
                        const qrDiv = document.getElementById(`qr-${item.item_code}`);
                        if (qrDiv) {
                            qrDiv.innerHTML = `<img src="${url}" alt="QR Code for ${item.item_name}">`;
                        }
                    }
                });
            });
        }

        window.downloadQR = function(code, name) {
            const qrImg = document.querySelector(`#qr-${code} img`);
            if (qrImg) {
                const link = document.createElement('a');
                link.href = qrImg.src;
                link.download = `qr-${name}-${code}.png`;
                link.click();
            }
        };

        // Toggle add item form
        document.getElementById('showAddForm').addEventListener('click', () => {
            document.getElementById('addItemForm').classList.toggle('active');
        });

        // Add item form submission
        document.getElementById('itemForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const data = {
                item_name: formData.get('item_name'),
                description: formData.get('description')
            };

            try {
                const response = await fetch('/api/user-items', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('addItemForm').classList.remove('active');
                    document.getElementById('itemForm').reset();
                    loadUserItems();
                } else {
                    alert('Error: ' + result.error);
                }
            } catch (error) {
                alert('Error adding item: ' + error.message);
            }
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/';
        });

        // Initialize
        checkAuth();
    </script>
</body>
</html>
